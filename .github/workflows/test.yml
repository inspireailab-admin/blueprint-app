name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      # Wails Linux build needs WebKit/GTK + libsoup; macOS + Windows have
      # WebView2 / WKWebView baked in already.
      - name: Install Linux Wails deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      # blueprint-cli is private. Configure git so Go module fetch uses
      # the KERNEL_ACCESS_TOKEN secret (a fine-grained PAT scoped to
      # read inspireailab-admin/blueprint-cli), and tell Go this is a
      # private module so it skips the public sumdb lookup.
      - name: Configure private kernel auth
        env:
          KERNEL_TOKEN: ${{ secrets.KERNEL_ACCESS_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${KERNEL_TOKEN}@github.com/".insteadOf "https://github.com/"
          echo "GOPRIVATE=github.com/inspireailab-admin/*" >> $GITHUB_ENV

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Verify Go module is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Test
        # Only Linux runs -race — Go 1.23's -race + cgo has had dyld
        # issues on macos-latest in the past, and we don't need three
        # runs of the race detector for this codebase yet.
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            go test -race ./...
          else
            go test ./...
          fi

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Wails build
        run: wails build -platform ${{ runner.os == 'macOS' && 'darwin/universal' || (runner.os == 'Windows' && 'windows/amd64' || 'linux/amd64') }}
