name: Release

# Tag-driven release. Push a `v*` tag (e.g. v0.1.0) and this builds
# per-OS installers (NSIS on Windows, .app+.dmg on macOS, AppImage on
# Linux), attaches them to a GitHub Release, and publishes release notes.
#
# Code signing + notarization are guarded behind secrets that may not
# be set yet — when WINDOWS_CERT / APPLE_DEVELOPER_ID are present the
# pipeline produces signed artifacts; otherwise it produces unsigned
# developer builds that the marketing /download page can call out
# honestly.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows/amd64
            wails_flags: '-nsis'
            artifact_glob: 'build/bin/blueprint-amd64-installer.exe'
            artifact_name: blueprint-windows-amd64-installer.exe
          - os: macos-latest
            target: darwin/universal
            wails_flags: ''
            artifact_glob: 'build/bin/blueprint.app'
            artifact_name: blueprint-macos-universal.app.zip
          - os: ubuntu-latest
            target: linux/amd64
            wails_flags: ''
            artifact_glob: 'build/bin/blueprint'
            artifact_name: blueprint-linux-amd64

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Wails deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install -g pnpm@10

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      # Build the supervisor binary BEFORE wails build so the NSIS
      # template's File include for blueprint-svc.exe finds it. We
      # also build it on macOS/Linux even though we don't ship a
      # Windows service on those platforms — Linux has its own systemd
      # variant we want to attach to the release.
      - name: Build blueprint-svc
        if: matrix.os == 'windows-latest'
        run: go build -o build/bin/blueprint-svc.exe ./cmd/blueprint-svc

      - name: Build blueprint-svc-linux
        if: matrix.os == 'ubuntu-latest'
        run: go build -o build/bin/blueprint-svc-linux ./cmd/blueprint-svc

      - name: Wails build
        run: |
          wails build \
            -platform ${{ matrix.target }} \
            ${{ matrix.wails_flags }} \
            -ldflags "-X main.AppVersion=${GITHUB_REF_NAME#v}"

      # ─── Windows: optionally code-sign the installer ─────────────
      # Set WINDOWS_CERT (base64-encoded .pfx) + WINDOWS_CERT_PASSWORD
      # as GitHub Actions secrets to enable. Without them the installer
      # is unsigned and the user gets a Defender SmartScreen warning on
      # first launch.
      - name: Sign Windows installer (when cert available)
        if: matrix.os == 'windows-latest' && env.WINDOWS_CERT != ''
        env:
          WINDOWS_CERT: ${{ secrets.WINDOWS_CERT }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          echo "$WINDOWS_CERT" | base64 -d > cert.pfx
          signtool sign /f cert.pfx /p "$WINDOWS_CERT_PASSWORD" /tr http://timestamp.digicert.com /td sha256 /fd sha256 ${{ matrix.artifact_glob }}
          rm -f cert.pfx

      # ─── macOS: zip the .app for upload, optionally notarize ─────
      - name: Package macOS .app
        if: matrix.os == 'macos-latest'
        run: |
          cd build/bin
          ditto -c -k --sequesterRsrc --keepParent blueprint.app ../../${{ matrix.artifact_name }}
          mv ../../${{ matrix.artifact_name }} ${{ matrix.artifact_name }}

      - name: Notarize macOS (when Apple ID available)
        if: matrix.os == 'macos-latest' && env.APPLE_ID != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool submit build/bin/${{ matrix.artifact_name }} \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait

      # ─── Final artifact rename (Windows + Linux) ─────────────────
      - name: Rename artifact
        if: matrix.os != 'macos-latest'
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            # Wails produces blueprint-amd64-installer.exe with -nsis;
            # the regular .exe is also there. Move the installer to a
            # predictable name for the upload step.
            cp ${{ matrix.artifact_glob }} build/bin/${{ matrix.artifact_name }}
          else
            cp build/bin/blueprint build/bin/${{ matrix.artifact_name }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build/bin/${{ matrix.artifact_name }}
          retention-days: 7

      # Linux ships its systemd-managed supervisor as a separate
      # artifact alongside the desktop binary. The install.sh script
      # already in installer/ pulls this and sudo-installs it.
      - name: Upload Linux service binary
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: blueprint-svc-linux-amd64
          path: build/bin/blueprint-svc-linux
          retention-days: 7

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Stage installer helpers
        # Ship the install-linux.sh shell script with the release so a
        # user can scp the service binary + script to a Linux host
        # and sudo-install in two commands.
        run: |
          mkdir -p staging/
          find artifacts/ -type f -name 'blueprint-*' -exec cp {} staging/ \;
          cp installer/install-linux.sh staging/
          cp installer/install-windows.ps1 staging/

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Blueprint $GITHUB_REF_NAME" \
            --notes-file .github/release-notes/${GITHUB_REF_NAME#v}.md \
            staging/*
